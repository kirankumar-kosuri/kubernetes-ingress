apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    purpose: ingress-demo
    app: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      purpose: ingress-demo
      app: app1
  template:
    metadata:
      labels:
          project: roboshop
          purpose: ingress-demo
          app: app1
    spec:
      containers:
        - name: app1
          image: kirankumarkosuri/app1:v1
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    project: roboshop
    purpose: ingress-demo
    app: app1
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:396199428170:certificate/1039818d-3829-41b8-80f5-c8b62d2f260d
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
    
spec:
  ingressClassName: alb
  rules:
  - host: "app1.daws86s.blog"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80



